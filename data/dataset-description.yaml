# NYC Taxi Trip Dataset — Deskripsi Kolom
# Dataset: TLC Trip Record Data (Yellow & Green Taxi)
# Sumber: https://www.nyc.gov/site/tlc/about/tlc-trip-record-data.page

dataset:
  name: NYC Taxi Trip Records
  provider: NYC Taxi & Limousine Commission (TLC)

columns:
  # ============================================================================
  # 1. INFORMASI IDENTITAS & PENYEDIA
  # ============================================================================
  - name: VendorID
    type: integer
    description: "Kode penyedia teknologi taksi yang mengirimkan data."
    values:
      1: Creative Mobile Technologies, LLC
      2: Curb Mobility, LLC (sebelumnya VeriFone Inc)
      6: Myle Technologies Inc
      7: Helix

  # ============================================================================
  # 2. WAKTU PERJALANAN (TIMESTAMP)
  # ============================================================================
  - name: tpep_pickup_datetime
    type: datetime
    description: "Tanggal & waktu penumpang naik (argometer dinyalakan). Prefix `tpep` = Yellow Taxi."
    note: "Untuk Green Taxi menggunakan prefix `lpep` (lpep_pickup_datetime)."

  - name: tpep_dropoff_datetime
    type: datetime
    description: "Tanggal & waktu penumpang turun (argometer dimatikan). Prefix `tpep` = Yellow Taxi."
    note: "Untuk Green Taxi menggunakan prefix `lpep` (lpep_dropoff_datetime)."

  # ============================================================================
  # 3. DETAIL PERJALANAN
  # ============================================================================
  - name: passenger_count
    type: integer
    description: "Jumlah penumpang (diinput manual oleh pengemudi)."

  - name: trip_distance
    type: float
    unit: miles
    description: "Jarak tempuh perjalanan berdasarkan argometer."

  - name: RatecodeID
    type: integer
    description: "Kode tarif akhir yang berlaku."
    values:
      1: Standard rate (Tarif standar)
      2: JFK (Bandara JFK)
      3: Newark (Bandara Newark)
      4: Nassau or Westchester
      5: Negotiated fare (Tarif negosiasi)
      6: Group ride (Rombongan)

  - name: store_and_fwd_flag
    type: string
    description: "Indikator apakah data sempat disimpan di memori kendaraan sebelum dikirim."
    values:
      Y: "Store and forward — data disimpan sementara karena koneksi terputus"
      N: "Not a store and forward — data langsung terkirim"

  # ============================================================================
  # 4. LOKASI WILAYAH (ZONA TLC)
  # ============================================================================
  - name: PULocationID
    type: integer
    description: "ID Zona Taksi TLC tempat penumpang naik."
    note: "Pada dataset sebelum 2016, kolom ini digantikan oleh koordinat (pickup_latitude, pickup_longitude)."

  - name: DOLocationID
    type: integer
    description: "ID Zona Taksi TLC tempat penumpang turun."
    note: "Pada dataset sebelum 2016, kolom ini digantikan oleh koordinat (dropoff_latitude, dropoff_longitude)."

  # ============================================================================
  # 5. METODE PEMBAYARAN & RINCIAN BIAYA
  # ============================================================================
  - name: payment_type
    type: integer
    description: "Kode metode pembayaran."
    values:
      1: "Credit card (Kartu kredit)"
      2: "Cash (Uang tunai)"
      3: "No charge (Gratis)"
      4: "Dispute (Sengketa tarif)"
      5: "Unknown (Tidak diketahui)"
      6: "Voided trip (Perjalanan dibatalkan)"

  - name: fare_amount
    type: float
    unit: USD
    description: "Tarif dasar berdasarkan kombinasi waktu & jarak (dihitung argometer)."

  - name: extra
    type: float
    unit: USD
    description: "Biaya tambahan dan surcharges (rush hour $0.50/$1.00, larut malam, dll)."

  - name: mta_tax
    type: float
    unit: USD
    description: "Pajak MTA sebesar $0.50, dipicu berdasarkan jenis tarif."

  - name: tip_amount
    type: float
    unit: USD
    description: "Tip penumpang (hanya tercatat dari pembayaran kartu kredit; tip tunai tidak tercatat)."

  - name: tolls_amount
    type: float
    unit: USD
    description: "Total biaya tol selama perjalanan."

  - name: improvement_surcharge
    type: float
    unit: USD
    description: "Biaya perbaikan sarana $0.30 (berlaku sejak 2015)."

  - name: congestion_surcharge
    type: float
    unit: USD
    description: "Biaya tambahan kemacetan New York State (NYS congestion surcharge)."

  - name: airport_fee
    type: float
    unit: USD
    description: "Biaya tambahan untuk penjemputan di Bandara LaGuardia atau JFK."

  - name: cbd_congestion_fee
    type: float
    unit: USD
    description: "Biaya per perjalanan yang ditarik untuk program pengendalian kemacetan lalu lintas oleh otoritas transportasi New York (MTA)."

  - name: total_amount
    type: float
    unit: USD
    description: "Total biaya ditagihkan ke penumpang."
    formula: "fare_amount + extra + mta_tax + tip_amount + tolls_amount + improvement_surcharge + congestion_surcharge + airport_fee"
